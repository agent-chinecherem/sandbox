<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioluminescence Explorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(to bottom, #0c1445, #1a2b7a, #000611);
            color: white;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #00ffff;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 20px #00ffff; }
            to { text-shadow: 0 0 30px #00ffff, 0 0 40px #00ffff; }
        }
        
        .organisms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .organism-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .organism-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.3);
        }
        
        .organism-card.active {
            border-color: #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }
        
        .organism-name {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .light-preview {
            width: 100%;
            height: 40px;
            border-radius: 20px;
            margin: 10px 0;
            border: 2px solid rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .light-orb {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            position: absolute;
            top: 5px;
            left: 5px;
            animation: float 3s ease-in-out infinite;
            box-shadow: 0 0 20px currentColor;
        }
        
        @keyframes float {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(calc(100% + 10px)); }
        }
        
        .reaction-display {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 30px;
            margin-top: 20px;
            border: 2px solid #00ffff;
        }
        
        .reaction-equation {
            font-size: 1.2em;
            text-align: center;
            margin: 20px 0;
            line-height: 1.6;
        }
        
        .molecule {
            color: #ffaa00;
            font-weight: bold;
        }
        
        .enzyme {
            color: #ff6b6b;
            font-weight: bold;
        }
        
        .product {
            color: #4ecdc4;
            font-weight: bold;
        }
        
        .wavelength-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }
        
        .spectrum-bar {
            width: 200px;
            height: 20px;
            background: linear-gradient(to right, #8b00ff, #4b0082, #0000ff, #00ffff, #00ff00, #ffff00, #ff7f00, #ff0000);
            border-radius: 10px;
            position: relative;
        }
        
        .wavelength-marker {
            position: absolute;
            top: -5px;
            width: 2px;
            height: 30px;
            background: white;
            box-shadow: 0 0 10px white;
        }
        
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #00ffff;
            border-radius: 50%;
            opacity: 0.7;
            animation: drift 10s linear infinite;
        }
        
        @keyframes drift {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-10px) translateX(100px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <h1>🌟 Bioluminescence Explorer 🌟</h1>
        
        <div class="organisms-grid" id="organisms-grid">
            <!-- Organisms will be populated by JavaScript -->
        </div>
        
        <div class="reaction-display" id="reaction-display">
            <h2>Chemical Reaction</h2>
            <div class="reaction-equation" id="reaction-equation">
                Select an organism to see its bioluminescent reaction
            </div>
            <div class="wavelength-info" id="wavelength-info" style="display: none;">
                <div>
                    <strong>Wavelength:</strong> <span id="wavelength-text"></span>
                    <br>
                    <strong>Color:</strong> <span id="color-name"></span>
                </div>
                <div class="spectrum-bar">
                    <div class="wavelength-marker" id="wavelength-marker"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Bioluminescent organisms data
        const organisms = [
            {
                name: "Firefly (Photinus pyralis)",
                environment: "Terrestrial",
                color: "#9aff9a",
                wavelength: 560,
                luciferin: "D-Luciferin",
                luciferase: "Firefly Luciferase",
                cofactors: ["ATP", "Mg²⁺", "O₂"],
                reaction: "D-Luciferin + ATP + O₂ → Oxyluciferin + Light + AMP + CO₂",
                description: "The classic summer evening light show"
            },
            {
                name: "Crystal Jelly (Aequorea victoria)",
                environment: "Marine",
                color: "#00ff9f",
                wavelength: 508,
                luciferin: "Coelenterazine",
                luciferase: "Aequorin",
                cofactors: ["Ca²⁺", "O₂"],
                reaction: "Coelenterazine + Ca²⁺ + O₂ → Coelenteramide + Light + CO₂",
                description: "Source of Green Fluorescent Protein (GFP)"
            },
            {
                name: "Deep Sea Anglerfish",
                environment: "Deep Sea",
                color: "#87ceeb",
                wavelength: 480,
                luciferin: "Bacterial Luciferin",
                luciferase: "Bacterial Luciferase",
                cofactors: ["FMNH₂", "RCHO", "O₂"],
                reaction: "FMNH₂ + RCHO + O₂ → FMN + RCOOH + H₂O + Light",
                description: "Symbiotic bacteria create the famous lure"
            },
            {
                name: "Dinoflagellate Plankton",
                environment: "Marine Surface",
                color: "#40e0d0",
                wavelength: 485,
                luciferin: "Dinoflagellate Luciferin",
                luciferase: "Dinoflagellate Luciferase",
                cofactors: ["O₂", "pH sensitive"],
                reaction: "Luciferin + O₂ → Oxyluciferin + Light (pH dependent)",
                description: "Creates glowing ocean waves and trails"
            },
            {
                name: "Railroad Worm",
                environment: "Terrestrial",
                color: "#ff4500",
                wavelength: 630,
                luciferin: "D-Luciferin",
                luciferase: "Modified Luciferase",
                cofactors: ["ATP", "Mg²⁺", "O₂"],
                reaction: "D-Luciferin + ATP + O₂ → Oxyluciferin + Red Light + AMP",
                description: "Rare red bioluminescence in nature"
            },
            {
                name: "Foxfire Mushroom",
                environment: "Forest Floor",
                color: "#32cd32",
                wavelength: 520,
                luciferin: "Fungal Luciferin",
                luciferase: "Fungal Luciferase",
                cofactors: ["O₂", "NADPH"],
                reaction: "Fungal Luciferin + O₂ + NADPH → Products + Green Light",
                description: "Mysterious glowing wood and mushrooms"
            }
        ];

        let selectedOrganism = null;

        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (Math.random() * 5 + 8) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // Populate organisms grid
        function populateOrganisms() {
            const grid = document.getElementById('organisms-grid');
            
            organisms.forEach((organism, index) => {
                const card = document.createElement('div');
                card.className = 'organism-card';
                card.onclick = () => selectOrganism(index);
                
                card.innerHTML = `
                    <div class="organism-name" style="color: ${organism.color};">
                        ${organism.name}
                    </div>
                    <div style="font-size: 0.9em; opacity: 0.8; margin-bottom: 10px;">
                        ${organism.environment}
                    </div>
                    <div class="light-preview">
                        <div class="light-orb" style="background-color: ${organism.color}; box-shadow: 0 0 20px ${organism.color};"></div>
                    </div>
                    <div style="font-size: 0.8em; opacity: 0.9;">
                        ${organism.description}
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        // Select organism and show reaction
        function selectOrganism(index) {
            selectedOrganism = organisms[index];
            
            // Update active state
            document.querySelectorAll('.organism-card').forEach((card, i) => {
                if (i === index) {
                    card.classList.add('active');
                } else {
                    card.classList.remove('active');
                }
            });
            
            // Update reaction display
            updateReactionDisplay();
        }

        function updateReactionDisplay() {
            if (!selectedOrganism) return;
            
            const reactionEq = document.getElementById('reaction-equation');
            const wavelengthInfo = document.getElementById('wavelength-info');
            const wavelengthText = document.getElementById('wavelength-text');
            const colorName = document.getElementById('color-name');
            const wavelengthMarker = document.getElementById('wavelength-marker');
            
            // Format the reaction equation with colors
            let formattedReaction = selectedOrganism.reaction
                .replace(/(Luciferin|D-Luciferin|Coelenterazine|FMNH₂)/g, '<span class="molecule">$1</span>')
                .replace(/(Luciferase|Aequorin)/g, '<span class="enzyme">$1</span>')
                .replace(/(Light|Oxyluciferin|Coelenteramide)/g, '<span class="product">$1</span>');
            
            reactionEq.innerHTML = `
                <strong>${selectedOrganism.name}</strong><br>
                <div style="margin: 15px 0; font-size: 1.1em;">
                    ${formattedReaction}
                </div>
                <div style="font-size: 0.9em; opacity: 0.9;">
                    <strong>Key Components:</strong><br>
                    <span class="molecule">Substrate:</span> ${selectedOrganism.luciferin}<br>
                    <span class="enzyme">Enzyme:</span> ${selectedOrganism.luciferase}<br>
                    <strong>Cofactors:</strong> ${selectedOrganism.cofactors.join(', ')}
                </div>
            `;
            
            // Show wavelength info
            wavelengthInfo.style.display = 'flex';
            wavelengthText.textContent = `${selectedOrganism.wavelength} nm`;
            colorName.textContent = getColorName(selectedOrganism.wavelength);
            colorName.style.color = selectedOrganism.color;
            
            // Position wavelength marker (visible spectrum: 380-750 nm)
            const markerPosition = ((selectedOrganism.wavelength - 380) / (750 - 380)) * 100;
            wavelengthMarker.style.left = Math.max(0, Math.min(100, markerPosition)) + '%';
        }

        function getColorName(wavelength) {
            if (wavelength < 450) return 'Violet/Blue';
            if (wavelength < 495) return 'Blue';
            if (wavelength < 570) return 'Green';
            if (wavelength < 590) return 'Yellow';
            if (wavelength < 620) return 'Orange';
            return 'Red';
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            populateOrganisms();
        });
    </script>
</body>
</html>
